name: Chatty CI/CD

on:
  push:
    branches: [ main ]

jobs:
  build-and-push:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Login to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Build and Push
        uses: docker/build-push-action@v5
        with:
          context: .
          push: true
          tags: ${{ secrets.DOCKERHUB_USERNAME }}/chatty:latest
          build-args: |
            NEXT_PUBLIC_apiKey=${{ secrets.NEXT_PUBLIC_apiKey }}
            NEXT_PUBLIC_authDomain=${{ secrets.NEXT_PUBLIC_authDomain }}
            NEXT_PUBLIC_projectId=${{ secrets.NEXT_PUBLIC_projectId }}
            NEXT_PUBLIC_storageBucket=${{ secrets.NEXT_PUBLIC_storageBucket }}
            NEXT_PUBLIC_messagingSenderId=${{ secrets.NEXT_PUBLIC_messagingSenderId }}
            NEXT_PUBLIC_appId=${{ secrets.NEXT_PUBLIC_appId }}
            NEXT_PUBLIC_measurementId=${{ secrets.NEXT_PUBLIC_measurementId }}

  deploy:
  needs: build-and-push
  runs-on: ubuntu-latest

  steps:
    - name: Install cloudflared
      run: |
        sudo apt-get update
        sudo apt-get install -y cloudflared

    - name: Setup SSH
      run: |
        mkdir -p ~/.ssh
        echo "${{ secrets.SSH_PRIVATE_KEY }}" > ~/.ssh/id_rsa
        chmod 600 ~/.ssh/id_rsa

        cat <<EOF >> ~/.ssh/config
        Host ssh.vipuldixit.tech
          HostName ssh.vipuldixit.tech
          User ${{ secrets.SERVER_USER }}
          IdentityFile ~/.ssh/id_rsa
          ProxyCommand cloudflared access ssh --hostname %h
        EOF

    - name: Deploy via Cloudflare SSH
      run: |
        ssh -o StrictHostKeyChecking=no ssh.vipuldixit.tech << 'EOF'

          docker pull ${{ secrets.DOCKERHUB_USERNAME }}/chatty:latest

          docker stop chatty-app || true
          docker rm chatty-app || true

          docker run -d \
            --name chatty-app \
            -p 5100:3000 \
            -e GEMINI_API_KEY="${{ secrets.GEMINI_API_KEY }}" \
            --restart always \
            ${{ secrets.DOCKERHUB_USERNAME }}/chatty:latest

          docker image prune -f

        EOF